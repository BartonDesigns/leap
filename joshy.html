// Faceplate accent palette: drives the page background tint via CSS custom properties.
// Each entry's `accent` is the primary tint; `dim` is a deeper variant for the second glow.
const FACE_ACCENTS = {
  BARD:      { accent: '#bdc73c', dim: '#5a6820' },
  SYNTHWAVE: { accent: '#e040a0', dim: '#5a1840' },
  DNB:       { accent: '#d4e030', dim: '#5a6810' },
  SPARKLE:   { accent: '#f0b0c8', dim: '#5a2840' }
};

function updateTheme() {
  const face = FACEPLATES[currentFace];
  const panel = document.getElementById('main-panel');
  // Keep the light chassis consistent across all faceplates; only the LCD changes
  // (The chassis background is set in CSS; we don't override it here.)
  panel.style.background = face.color;
  panel.style.color = face.text;
  document.getElementById('title-name').textContent = `${face.emoji} LVL. 99 ${currentFace}`;

  // LCD scanlines only for BARD
  if (currentFace === 'BARD') {
    panel.classList.add('bard-lcd');
  } else {
    panel.classList.remove('bard-lcd');
  }

  // Update the page-level accent so the background tint and chassis glow match the faceplate
  const accent = FACE_ACCENTS[currentFace] || FACE_ACCENTS.BARD;
  document.documentElement.style.setProperty('--face-accent', accent.accent);
  document.documentElement.style.setProperty('--face-accent-dim', accent.dim);
}

// ===== KEYBOARD INPUT =====
const pressedKeys = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();

  if (key === ' ') {
    e.preventDefault();
    initAudio();
    if (sequencerRunning) stopSequencer(); else startSequencer();
    return;
  }

  if (pressedKeys.has(key)) return;
  pressedKeys.add(key);

  const leadIdx = LEAD_KEYS.indexOf(key);
  if (leadIdx >= 0) {
    // Each keyboard key gets its own voice — held keys stack as chords
    const pad = document.querySelector(`.lead-pad[data-key="${key}"]`);
    withQuantize(
      () => {
        playLead('kbd:' + key, leadIdx);
        leadOwner = 'keyboard';
        if (pad) pad.classList.add('pressed');
      },
      (recStep) => recordLeadHit(leadIdx, recStep)
    );
    return;
  }

  const drumIdx = DRUM_KEYS.indexOf(key);
  if (drumIdx >= 0) {
    const drumName = DRUM_NAMES[drumIdx];
    const pad = document.querySelector(`.drum-pad[data-key="${key}"]`);
    // Build mode is structural — bypass quantize so layering feels instant
    if (beatLoopBuildMode) {
      playDrum(drumName);
      if (pad) pad.classList.add('pressed');
      liveDrumLayers.add(drumName);
      beatLoopTappedDuringHold = true;
      if (pad) pad.classList.add('in-loop');
      return;
    }
    withQuantize(
      () => {
        playDrum(drumName);
        if (pad) pad.classList.add('pressed');
      },
      (recStep) => recordDrumHit(drumName, recStep)
    );
    return;
  }

  const fxIdx = FX_KEYS.indexOf(key);
  if (fxIdx >= 0) {
    const pad = document.querySelector(`.fx-pad[data-key="${key}"]`);
    withQuantize(() => {
      playFX(FX_NAMES[fxIdx]);
      if (pad) pad.classList.add('pressed');
    });
    return;
  }
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  pressedKeys.delete(key);

  const leadIdx = LEAD_KEYS.indexOf(key);
  if (leadIdx >= 0) {
    // Stop just this key's voice — other held keys keep ringing (polyphonic)
    stopLead('kbd:' + key);
    // If no keyboard lead voices remain, drop the owner flag
    const stillHeld = LEAD_KEYS.some(k => pressedKeys.has(k));
    if (!stillHeld) leadOwner = (leadOwner === 'keyboard') ? null : leadOwner;
    const pad = document.querySelector(`.lead-pad[data-key="${key}"]`);
    if (pad) pad.classList.remove('pressed');
    return;
  }

  const drumIdx = DRUM_KEYS.indexOf(key);
  if (drumIdx >= 0) {
    const pad = document.querySelector(`.drum-pad[data-key="${key}"]`);
    if (pad) pad.classList.remove('pressed');
    return;
  }

  const fxIdx = FX_KEYS.indexOf(key);
  if (fxIdx >= 0) {
    const pad = document.querySelector(`.fx-pad[data-key="${key}"]`);
    if (pad) pad.classList.remove('pressed');
    return;
  }
});

// ===== VISUALIZER =====
function drawVisualizer() {
  const canvas = document.getElementById('visualizer-bg');
  const cctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  cctx.scale(2, 2);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  function draw() {
    requestAnimationFrame(draw);
    // Clear canvas (transparent) so the LCD lime background shows through
    cctx.clearRect(0, 0, w, h);
    if (!analyser) return;
    const bufLen = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(dataArray);

    const face = FACEPLATES[currentFace];
    // Use a darker stroke on light faceplates (BARD, DNB), lighter on dark ones
    cctx.lineWidth = 2;
    cctx.strokeStyle = (currentFace === 'BARD' || face.text === '#000')
      ? 'rgba(14, 22, 35, 0.55)'
      : (face.text + '80');
    cctx.beginPath();

    const sliceWidth = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArray[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) cctx.moveTo(x, y);
      else cctx.lineTo(x, y);
      x += sliceWidth;
    }
    cctx.lineTo(w, h / 2);
    cctx.stroke();
  }
  draw();
}

// ===== HIT GRID =====
// Draws a 16-step pattern view BEHIND the waveform: one row per active source
// (seed kick/snare/hihat, each live-built layer, each recorded drum, recorded lead).
// As hits accumulate, the grid fills in — giving the user a visual sense of what
// they've built so far. The current step gets a brighter vertical highlight that
// sweeps across the grid in time with the sequencer.
function drawHitGrid() {
  const canvas = document.getElementById('hit-grid');
  if (!canvas) return;
  const gctx = canvas.getContext('2d');
  // Use devicePixelRatio for crisp lines on retina displays
  const dpr = window.devicePixelRatio || 1;
  let w = canvas.offsetWidth;
  let h = canvas.offsetHeight;

  function resizeIfNeeded() {
    const ow = canvas.offsetWidth;
    const oh = canvas.offsetHeight;
    if (canvas.width !== ow * dpr || canvas.height !== oh * dpr) {
      canvas.width = ow * dpr;
      canvas.height = oh * dpr;
      gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      w = ow;
      h = oh;
    }
  }

  // Colors per source type — chosen to read on a lime/pink/yellow LCD without clashing
  const COLOR_SEED  = 'rgba(14, 22, 35, 0.55)';    // dark navy for the preset rhythm
  const COLOR_LAYER = 'rgba(220, 60, 80, 0.7)';     // red for build-mode injected layers
  const COLOR_REC   = 'rgba(0, 120, 220, 0.7)';     // blue for recorded performance drums
  const COLOR_LEAD  = 'rgba(120, 60, 200, 0.75)';   // purple for recorded lead notes
  const COLOR_GRID_LINE = 'rgba(14, 22, 35, 0.08)'; // very subtle column separators
  const COLOR_CURRENT_STEP = 'rgba(14, 22, 35, 0.18)'; // subtle highlight on active step

  // Build the row list dynamically based on what's currently in the loop
  function collectRows() {
    const rows = [];
    if (beatLoopOn) {
      const seed = BEAT_PATTERNS[currentFace][currentBeat];
      if (seed.kick.some(v => v))  rows.push({ name: 'KICK',  pat: seed.kick,  color: COLOR_SEED });
      if (seed.snare.some(v => v)) rows.push({ name: 'SNARE', pat: seed.snare, color: COLOR_SEED });
      if (seed.hihat.some(v => v)) rows.push({ name: 'HAT',   pat: seed.hihat, color: COLOR_SEED });
    }
    // Live layers from BUILD mode — show in red so user can see what they injected
    const injects = DRUM_INJECT_PATTERNS[currentFace];
    liveDrumLayers.forEach(drumName => {
      const pat = injects[drumName];
      if (pat) rows.push({ name: drumName.toUpperCase(), pat: pat, color: COLOR_LAYER });
    });
    // Recorded drum performance — show in blue so user can see what they played
    Object.keys(recordedDrumSteps).forEach(drumName => {
      rows.push({ name: drumName.toUpperCase() + '*', pat: recordedDrumSteps[drumName], color: COLOR_REC });
    });
    // Recorded lead — build a pattern array from the recordedLeadSteps slots
    const hasLead = recordedLeadSteps.some(s => s !== null);
    if (hasLead) {
      const leadPat = recordedLeadSteps.map(s => s !== null ? 1 : 0);
      rows.push({ name: 'LEAD', pat: leadPat, color: COLOR_LEAD });
    }
    return rows;
  }

  function frame() {
    requestAnimationFrame(frame);
    resizeIfNeeded();
    gctx.clearRect(0, 0, w, h);

    const rows = collectRows();
    // If nothing is active, just draw the subtle column lines so the grid presence is hinted at
    const cellW = w / 16;

    // Current step highlight (subtle vertical band)
    if (sequencerRunning) {
      gctx.fillStyle = COLOR_CURRENT_STEP;
      gctx.fillRect(currentStep * cellW, 0, cellW, h);
    }

    // Column separators every 4 steps (the downbeats), even fainter for every step
    gctx.strokeStyle = COLOR_GRID_LINE;
    gctx.lineWidth = 1;
    for (let i = 1; i < 16; i++) {
      gctx.beginPath();
      const x = Math.round(i * cellW) + 0.5;
      gctx.moveTo(x, 0);
      gctx.lineTo(x, h);
      gctx.globalAlpha = (i % 4 === 0) ? 0.6 : 0.3;
      gctx.stroke();
    }
    gctx.globalAlpha = 1;

    if (rows.length === 0) return;

    // Lay out rows vertically, stacked from the bottom up so the waveform centerline
    // (mid-height) stays clear-ish. We cap at 8 rows; if more exist we shrink each row.
    const maxRows = Math.min(rows.length, 8);
    const rowH = Math.max(4, Math.min(14, (h * 0.85) / maxRows));
    const totalH = rowH * maxRows;
    const startY = h - totalH - 4;

    rows.slice(0, maxRows).forEach((row, i) => {
      const y = startY + i * rowH;
      for (let step = 0; step < 16; step++) {
        if (row.pat[step]) {
          gctx.fillStyle = row.color;
          // Inset a little for visual breathing room
          const px = step * cellW + 1.5;
          const py = y + 1;
          const pw = cellW - 3;
          const ph = rowH - 2;
          gctx.fillRect(px, py, pw, ph);
        }
      }
    });
  }
  frame();
}

// ===== XY FILTER PAD =====
let xyActive = false;
function initXYPad() {
  const container = document.getElementById('xy-pad-touch');
  const dot = document.getElementById('xy-dot');

  function updateFilter(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    let x = (clientX - rect.left) / rect.width;
    let y = (clientY - rect.top) / rect.height;
    x = Math.max(0, Math.min(1, x));
    y = Math.max(0, Math.min(1, y));

    // Position dot
    dot.style.left = (x * 100) + '%';
    dot.style.top = (y * 100) + '%';

    // X = frequency (exponential mapping 20Hz - 20000Hz)
    const freq = 20 * Math.pow(1000, x);
    // Y = resonance (0 top to 25 bottom)
    const q = y * 25;

    if (masterFilter) {
      masterFilter.frequency.value = freq;
      masterFilter.Q.value = q;
    }
    // Update LPF slider to match
    document.getElementById('sl-lpf').value = freq;
  }

  function onStart(e) {
    e.preventDefault();
    initAudio();
    xyActive = true;
    dot.classList.add('active');
    const touch = e.touches ? e.touches[0] : e;
    updateFilter(touch.clientX, touch.clientY);
  }

  function onMove(e) {
    if (!xyActive) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    updateFilter(touch.clientX, touch.clientY);
  }

  function onEnd(e) {
    xyActive = false;
    dot.classList.remove('active');
    // Return dot to center
    dot.style.left = '50%';
    dot.style.top = '50%';
    // Reset filter to neutral
    if (masterFilter) {
      masterFilter.frequency.value = 20000;
      masterFilter.Q.value = 1;
    }
    document.getElementById('sl-lpf').value = 20000;
  }

  // Mouse events
  container.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);

  // Touch events
  container.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

// ===== LOOP CAPTURE / ARRANGER =====
let arrangerSections = [];
const SECTION_COLORS = {
  VERSE: '#4a9eff',
  CHORUS: '#ff4a9e',
  BRIDGE: '#9eff4a',
  INTRO: '#ffcc4a',
  BUILD: '#ff6b4a',
  OUTRO: '#9e4aff'
};

function initLoopCapture() {
  // Toggle arrange panel
  document.getElementById('btn-arrange').addEventListener('click', () => {
    const section = document.getElementById('loop-capture-section');
    section.classList.toggle('visible');
    document.getElementById('btn-arrange').classList.toggle('active', section.classList.contains('visible'));
  });

  // Clear sequence — wipes live drum layers, recorded performance, and turns the loop off
  document.getElementById('btn-clr-seq').addEventListener('click', () => {
    liveDrumLayers.clear();
    document.querySelectorAll('.drum-pad.in-loop').forEach(p => p.classList.remove('in-loop'));
    clearLiveRecording();
    beatLoopOn = false;
    document.getElementById('btn-beatloop').classList.remove('active');
    currentStep = 0;
  });

  // Capture loop — snapshots seed + layered drums + recorded performance as a chunk
  document.getElementById('btn-capture-loop').addEventListener('click', () => {
    const type = document.getElementById('section-type-select').value;
    const seed = BEAT_PATTERNS[currentFace][currentBeat];
    const section = {
      type: type,
      beat: currentBeat,
      beatName: seed.name,
      face: currentFace,
      scale: currentScale,
      bpm: bpm,
      seed: seed,
      layers: Array.from(liveDrumLayers),
      // Deep-clone the recorded buffers so further recording doesn't mutate the captured chunk
      recordedDrumSteps: JSON.parse(JSON.stringify(recordedDrumSteps)),
      recordedLeadSteps: recordedLeadSteps.slice()
    };
    arrangerSections.push(section);
    renderArranger();
    // After capture: clear live sequence + recording so the user can build a fresh one
    liveDrumLayers.clear();
    document.querySelectorAll('.drum-pad.in-loop').forEach(p => p.classList.remove('in-loop'));
    clearLiveRecording();
  });

  // Clear all arranger
  document.getElementById('btn-arranger-clear').addEventListener('click', () => {
    arrangerSections = [];
    renderArranger();
  });
}

function renderArranger() {
  const list = document.getElementById('arranger-list');
  list.innerHTML = '';
  arrangerSections.forEach((sec, i) => {
    const item = document.createElement('div');
    item.className = 'arranger-item';
    const layerStr = sec.layers && sec.layers.length ? ` + ${sec.layers.join(',')}` : '';
    const beatLabel = sec.beatName ? sec.beatName : `BEAT ${sec.beat + 1}`;
    item.innerHTML = `
      <span class="dot" style="background:${SECTION_COLORS[sec.type] || '#888'}"></span>
      <span class="item-label">${i + 1}. ${sec.type} — ${beatLabel}${layerStr}</span>
      <span class="item-delete" data-idx="${i}">&#128465;</span>
    `;
    item.querySelector('.item-delete').addEventListener('click', () => {
      arrangerSections.splice(i, 1);
      renderArranger();
    });
    list.appendChild(item);
  });
}

// ===== INIT =====
buildUI();
drawVisualizer();
drawHitGrid();
initXYPad();
initLoopCapture();
</script>
</body>
</html>
